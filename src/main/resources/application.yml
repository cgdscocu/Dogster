spring:
  application:
    name: dogster-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/dogster}
    username: ${DB_USERNAME:dogster}
    password: ${DB_PASSWORD:dogster}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${SERVER_PORT:8080}

dogster:
  storage:
    root-dir: ${DOGSTER_STORAGE_ROOT:uploads}
